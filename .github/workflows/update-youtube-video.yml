name: Update Latest YouTube Video

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:  # Allow manual triggering for testing

permissions:
  contents: write

jobs:
  update-video:
    runs-on: ubuntu-latest

    # Skip if the last commit was from the bot to prevent loops
    if: github.event.head_commit.author.name != 'bush-chapel-bot'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch latest video from RSS feed
        id: fetch_video
        run: |
          # Hardcoded channel ID for @Thebushchapel
          CHANNEL_ID="UC4LfSjlnX99HNzV3e87xpjA"
          RSS_URL="https://www.youtube.com/feeds/videos.xml?channel_id=$CHANNEL_ID"

          # Fetch RSS feed with retries
          MAX_RETRIES=5
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RSS_CONTENT=$(curl -sSL --max-time 30 \
              -H "User-Agent: Mozilla/5.0 (compatible; BushChapelBot/1.0)" \
              "$RSS_URL" 2>/dev/null || echo "")

            # Verify we got actual RSS XML, not an HTML error/consent page
            if echo "$RSS_CONTENT" | grep -q '<yt:videoId>'; then
              break
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Retry $RETRY_COUNT/$MAX_RETRIES (response was empty or not valid RSS)..."
            sleep $((RETRY_COUNT * 3))
          done

          if ! echo "$RSS_CONTENT" | grep -q '<yt:videoId>'; then
            echo "YouTube RSS temporarily unavailable — will retry next run"
            exit 0
          fi

          # Extract latest video ID from XML
          LATEST_VIDEO_ID=$(echo "$RSS_CONTENT" | grep -oP '<yt:videoId>\K[^<]+' | head -n 1)

          if [ -z "$LATEST_VIDEO_ID" ]; then
            echo "Error: Failed to extract video ID from RSS feed"
            exit 1
          fi

          # Validate video ID format (11 chars, alphanumeric + - and _)
          if ! echo "$LATEST_VIDEO_ID" | grep -qE '^[A-Za-z0-9_-]{11}$'; then
            echo "Error: Invalid video ID format: $LATEST_VIDEO_ID"
            exit 1
          fi

          echo "video_id=$LATEST_VIDEO_ID" >> $GITHUB_OUTPUT
          echo "Latest video ID: $LATEST_VIDEO_ID"

          # Extract video title for commit message
          VIDEO_TITLE=$(echo "$RSS_CONTENT" | grep -oP '<title>\K[^<]+' | sed -n '2p' | sed 's/&amp;/\&/g; s/&lt;/</g; s/&gt;/>/g; s/&quot;/"/g; s/&#39;/'\''/g')

          # Escape single quotes for shell
          VIDEO_TITLE=$(echo "$VIDEO_TITLE" | sed "s/'/'\"'\"'/g")

          echo "video_title=$VIDEO_TITLE" >> $GITHUB_OUTPUT
          echo "Video title: $VIDEO_TITLE"

      - name: Check current video ID
        id: check_current
        run: |
          CURRENT_VIDEO_ID=$(grep -oP 'youtube\.com/embed/\K[^"]+' index.html | head -n 1)
          echo "current_id=$CURRENT_VIDEO_ID" >> $GITHUB_OUTPUT
          echo "Current video ID: $CURRENT_VIDEO_ID"

      - name: Update video embed
        id: update_embed
        run: |
          CURRENT_ID="${{ steps.check_current.outputs.current_id }}"
          LATEST_ID="${{ steps.fetch_video.outputs.video_id }}"

          VIDEO_CHANGED=false

          # Check if video needs updating
          if [ "$CURRENT_ID" != "$LATEST_ID" ]; then
            echo "Updating video from $CURRENT_ID to $LATEST_ID"
            sed -i "s|youtube\.com/embed/${CURRENT_ID}|youtube.com/embed/${LATEST_ID}|g" index.html

            NEW_ID=$(grep -oP 'youtube\.com/embed/\K[^"]+' index.html | head -n 1)
            if [ "$NEW_ID" != "$LATEST_ID" ]; then
              echo "Error: Failed to update video ID"
              exit 1
            fi
            VIDEO_CHANGED=true
          fi

          if [ "$VIDEO_CHANGED" = "true" ]; then
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "video_changed=$VIDEO_CHANGED" >> $GITHUB_OUTPUT
          else
            echo "No updates needed"
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Update video archive
        id: update_archive
        run: |
          CHANNEL_ID="UC4LfSjlnX99HNzV3e87xpjA"
          RSS_URL="https://www.youtube.com/feeds/videos.xml?channel_id=$CHANNEL_ID"
          RSS_CONTENT=$(curl -sSL --max-time 30 \
            -H "User-Agent: Mozilla/5.0 (compatible; BushChapelBot/1.0)" \
            "$RSS_URL" 2>/dev/null || echo "")

          if ! echo "$RSS_CONTENT" | grep -q '<yt:videoId>'; then
            echo "Could not fetch valid RSS for archive update"
            echo "archive_changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Write RSS to temp file for Python to read
          echo "$RSS_CONTENT" > /tmp/rss_feed.xml

          python3 << 'PYEOF'
          import json, re, sys

          # Read RSS feed from temp file
          with open('/tmp/rss_feed.xml', 'r') as f:
              rss = f.read()

          # Parse video entries from RSS
          entries = re.findall(
              r'<yt:videoId>([^<]+)</yt:videoId>.*?<title>([^<]+)</title>.*?<published>([^<]+)</published>',
              rss, re.DOTALL
          )

          # Load existing archive
          try:
              with open('videos.json', 'r') as f:
                  archive = json.load(f)
          except:
              archive = {'lastUpdated': '', 'videos': []}

          existing_ids = {v['id'] for v in archive['videos']}
          new_videos = []

          for vid_id, title, pub_date in entries:
              if vid_id in existing_ids:
                  continue

              # Clean title
              t = title.strip()
              for prefix in ['The Bush Chapel - ', 'The Bush Chapel -  ', 'The Bush Chapel -']:
                  if t.startswith(prefix):
                      t = t[len(prefix):]
              t = t.rstrip('.').strip()

              # Detect season
              tl = title.lower()
              if 'lent' in tl or 'passion' in tl:
                  season = 'lent'
              elif 'advent' in tl:
                  season = 'advent'
              elif 'christmas' in tl:
                  season = 'christmas'
              elif 'easter' in tl:
                  season = 'easter'
              elif 'pentecost' in tl:
                  season = 'pentecost'
              else:
                  season = 'ordinary-time'

              date = pub_date[:10]
              year = int(date[:4])

              new_videos.append({
                  'id': vid_id,
                  'title': t,
                  'published': date,
                  'season': season,
                  'year': year
              })

          if new_videos:
              # Insert new videos at the beginning (newest first)
              archive['videos'] = new_videos + archive['videos']
              archive['lastUpdated'] = new_videos[0]['published']

              with open('videos.json', 'w') as f:
                  json.dump(archive, f, indent=2)

              print(f"Added {len(new_videos)} new video(s) to archive")
              with open('/tmp/archive_changed', 'w') as f:
                  f.write('true')
          else:
              print("No new videos for archive")
              with open('/tmp/archive_changed', 'w') as f:
                  f.write('false')
          PYEOF

          ARCHIVE_CHANGED=$(cat /tmp/archive_changed 2>/dev/null || echo "false")
          echo "archive_changed=$ARCHIVE_CHANGED" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.update_embed.outputs.updated == 'true' || steps.update_archive.outputs.archive_changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "bush-chapel-bot"

          VIDEO_TITLE="${{ steps.fetch_video.outputs.video_title }}"
          VIDEO_CHANGED="${{ steps.update_embed.outputs.video_changed }}"
          ARCHIVE_CHANGED="${{ steps.update_archive.outputs.archive_changed }}"

          git add index.html videos.json

          # Build commit message based on what changed
          PARTS=""
          if [ "$VIDEO_CHANGED" = "true" ]; then
            PARTS="video: $VIDEO_TITLE"
          fi
          if [ "$ARCHIVE_CHANGED" = "true" ]; then
            [ -n "$PARTS" ] && PARTS="$PARTS, "
            PARTS="${PARTS}archive"
          fi

          COMMIT_MSG="[skip ci] Update $PARTS"

          git commit -m "$COMMIT_MSG"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.update_embed.outputs.updated }}" = "true" ]; then
            echo "Updates applied:"
            if [ "${{ steps.update_embed.outputs.video_changed }}" = "true" ]; then
              echo "  - Video: ${{ steps.fetch_video.outputs.video_title }}"
            fi
          else
            echo "No updates needed - everything is current"
          fi

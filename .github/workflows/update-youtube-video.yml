name: Update Latest YouTube Video

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:  # Allow manual triggering for testing

permissions:
  contents: write

jobs:
  update-video:
    runs-on: ubuntu-latest

    # Skip if the last commit was from the bot to prevent loops
    if: github.event.head_commit.author.name != 'bush-chapel-bot'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch latest video from RSS feed
        id: fetch_video
        run: |
          # Hardcoded channel ID for @Thebushchapel
          CHANNEL_ID="UC4LfSjlnX99HNzV3e87xpjA"
          RSS_URL="https://www.youtube.com/feeds/videos.xml?channel_id=$CHANNEL_ID"

          # Fetch RSS feed with retries
          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RSS_CONTENT=$(curl -sSL --max-time 30 "$RSS_URL" 2>/dev/null || echo "")

            if [ -n "$RSS_CONTENT" ]; then
              break
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Retry $RETRY_COUNT/$MAX_RETRIES..."
            sleep $((RETRY_COUNT * 2))  # Exponential backoff
          done

          if [ -z "$RSS_CONTENT" ]; then
            echo "Error: Failed to fetch RSS feed after $MAX_RETRIES retries"
            exit 1
          fi

          # Extract latest video ID from XML
          LATEST_VIDEO_ID=$(echo "$RSS_CONTENT" | grep -oP '<yt:videoId>\K[^<]+' | head -n 1)

          if [ -z "$LATEST_VIDEO_ID" ]; then
            echo "Error: Failed to extract video ID from RSS feed"
            exit 1
          fi

          # Validate video ID format (11 chars, alphanumeric + - and _)
          if ! echo "$LATEST_VIDEO_ID" | grep -qE '^[A-Za-z0-9_-]{11}$'; then
            echo "Error: Invalid video ID format: $LATEST_VIDEO_ID"
            exit 1
          fi

          echo "video_id=$LATEST_VIDEO_ID" >> $GITHUB_OUTPUT
          echo "Latest video ID: $LATEST_VIDEO_ID"

          # Extract video title for commit message
          VIDEO_TITLE=$(echo "$RSS_CONTENT" | grep -oP '<title>\K[^<]+' | sed -n '2p' | sed 's/&amp;/\&/g; s/&lt;/</g; s/&gt;/>/g; s/&quot;/"/g; s/&#39;/'\''/g')

          # Escape single quotes for shell
          VIDEO_TITLE=$(echo "$VIDEO_TITLE" | sed "s/'/'\"'\"'/g")

          echo "video_title=$VIDEO_TITLE" >> $GITHUB_OUTPUT
          echo "Video title: $VIDEO_TITLE"

      - name: Check current video ID
        id: check_current
        run: |
          CURRENT_VIDEO_ID=$(grep -oP 'youtube\.com/embed/\K[^"]+' index.html | head -n 1)
          echo "current_id=$CURRENT_VIDEO_ID" >> $GITHUB_OUTPUT
          echo "Current video ID: $CURRENT_VIDEO_ID"

      - name: Find latest liturgy PDF
        id: find_pdf
        run: |
          # Find the most recently committed PDF in the repo root (by git commit date)
          LATEST_PDF=$(git log --diff-filter=A --name-only --pretty=format: -- '*.pdf' | head -n 1)

          if [ -z "$LATEST_PDF" ]; then
            echo "No PDFs found in repo"
            echo "pdf_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Latest PDF: $LATEST_PDF"
          echo "pdf_found=true" >> $GITHUB_OUTPUT
          echo "pdf_filename=$LATEST_PDF" >> $GITHUB_OUTPUT

          # URL-encode the filename (spaces to %20)
          PDF_URL_ENCODED=$(echo "$LATEST_PDF" | sed 's/ /%20/g')
          echo "pdf_url_encoded=$PDF_URL_ENCODED" >> $GITHUB_OUTPUT

      - name: Get current PDF references
        id: current_pdf
        run: |
          # Extract current PDF filename from the download link in index.html
          CURRENT_PDF_ENCODED=$(grep -oP 'href="\K[^"]*\.pdf' index.html | head -n 1)
          echo "current_pdf_encoded=$CURRENT_PDF_ENCODED" >> $GITHUB_OUTPUT
          echo "Current PDF reference: $CURRENT_PDF_ENCODED"

      - name: Update video embed and PDF
        id: update_embed
        run: |
          CURRENT_ID="${{ steps.check_current.outputs.current_id }}"
          LATEST_ID="${{ steps.fetch_video.outputs.video_id }}"
          CURRENT_PDF="${{ steps.current_pdf.outputs.current_pdf_encoded }}"
          LATEST_PDF="${{ steps.find_pdf.outputs.pdf_url_encoded }}"
          PDF_FOUND="${{ steps.find_pdf.outputs.pdf_found }}"

          VIDEO_CHANGED=false
          PDF_CHANGED=false

          # Check if video needs updating
          if [ "$CURRENT_ID" != "$LATEST_ID" ]; then
            echo "Updating video from $CURRENT_ID to $LATEST_ID"
            sed -i "s|youtube\.com/embed/${CURRENT_ID}|youtube.com/embed/${LATEST_ID}|g" index.html

            NEW_ID=$(grep -oP 'youtube\.com/embed/\K[^"]+' index.html | head -n 1)
            if [ "$NEW_ID" != "$LATEST_ID" ]; then
              echo "Error: Failed to update video ID"
              exit 1
            fi
            VIDEO_CHANGED=true
          fi

          # Check if PDF needs updating
          if [ "$PDF_FOUND" = "true" ] && [ "$CURRENT_PDF" != "$LATEST_PDF" ]; then
            echo "Updating PDF from $CURRENT_PDF to $LATEST_PDF"

            # Update index.html - iframe src and download link
            sed -i "s|gview?url=https://thebushchapel.vercel.app/${CURRENT_PDF}|gview?url=https://thebushchapel.vercel.app/${LATEST_PDF}|g" index.html
            sed -i "s|href=\"${CURRENT_PDF}\"|href=\"${LATEST_PDF}\"|g" index.html

            # Update seasons/lent.html - iframe src and download link
            sed -i "s|gview?url=https://thebushchapel.vercel.app/${CURRENT_PDF}|gview?url=https://thebushchapel.vercel.app/${LATEST_PDF}|g" seasons/lent.html
            sed -i "s|href=\"../${CURRENT_PDF}\"|href=\"../${LATEST_PDF}\"|g" seasons/lent.html

            PDF_CHANGED=true
          fi

          if [ "$VIDEO_CHANGED" = "true" ] || [ "$PDF_CHANGED" = "true" ]; then
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "video_changed=$VIDEO_CHANGED" >> $GITHUB_OUTPUT
            echo "pdf_changed=$PDF_CHANGED" >> $GITHUB_OUTPUT
          else
            echo "No updates needed"
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.update_embed.outputs.updated == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "bush-chapel-bot"

          VIDEO_TITLE="${{ steps.fetch_video.outputs.video_title }}"
          VIDEO_CHANGED="${{ steps.update_embed.outputs.video_changed }}"
          PDF_CHANGED="${{ steps.update_embed.outputs.pdf_changed }}"
          PDF_NAME="${{ steps.find_pdf.outputs.pdf_filename }}"

          git add index.html seasons/lent.html

          # Build commit message based on what changed
          if [ "$VIDEO_CHANGED" = "true" ] && [ "$PDF_CHANGED" = "true" ]; then
            COMMIT_MSG="[skip ci] Update video: $VIDEO_TITLE and PDF: $PDF_NAME"
          elif [ "$VIDEO_CHANGED" = "true" ]; then
            COMMIT_MSG="[skip ci] Update latest video: $VIDEO_TITLE"
          else
            COMMIT_MSG="[skip ci] Update liturgy PDF to: $PDF_NAME"
          fi

          git commit -m "$COMMIT_MSG"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.update_embed.outputs.updated }}" = "true" ]; then
            echo "Updates applied:"
            if [ "${{ steps.update_embed.outputs.video_changed }}" = "true" ]; then
              echo "  - Video: ${{ steps.fetch_video.outputs.video_title }}"
            fi
            if [ "${{ steps.update_embed.outputs.pdf_changed }}" = "true" ]; then
              echo "  - PDF: ${{ steps.find_pdf.outputs.pdf_filename }}"
            fi
          else
            echo "No updates needed - everything is current"
          fi
